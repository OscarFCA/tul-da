<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tul-Dá — Validar boleto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --obsidian:    #0A0A0A;
    --deep-night:  #111111;
    --ritual-gold: #C9973A;
    --pale-gold:   #E8D5A3;
    --moonlight:   #D4CFC8;
    --teal:        #1A4A47;
  }

  body {
    background: var(--obsidian);
    color: var(--pale-gold);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }

  /* ─── Header ─────────────────── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header__label {
    font-size: 10px;
    letter-spacing: .25em;
    color: var(--moonlight);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header__logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 600;
    color: var(--ritual-gold);
    letter-spacing: .05em;
  }
  .header__route {
    font-size: 10px;
    letter-spacing: .2em;
    color: var(--moonlight);
    margin-top: 4px;
  }

  /* ─── Card ───────────────────── */
  .card {
    background: var(--deep-night);
    border: 1px solid #C9973A44;
    border-radius: 4px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }

  /* ─── Estado badge ───────────── */
  .status-bar {
    padding: 14px 24px;
    text-align: center;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .status-bar.valid   { background: #1a3a1a; color: #6fcf6f; border-bottom: 1px solid #6fcf6f44; }
  .status-bar.burned  { background: #3a1a1a; color: #cf6f6f; border-bottom: 1px solid #cf6f6f44; }
  .status-bar.loading { background: #1a1a1a; color: var(--moonlight); border-bottom: 1px solid #333; }
  .status-bar.error   { background: #3a2a1a; color: #cfb06f; border-bottom: 1px solid #cfb06f44; }

  /* ─── Info ───────────────────── */
  .info { padding: 24px 24px 8px; }

  .info__row {
    margin-bottom: 18px;
  }
  .info__label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ritual-gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .info__value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--pale-gold);
    line-height: 1.2;
  }
  .info__value-sm {
    font-size: 15px;
    color: var(--moonlight);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    line-height: 1.5;
  }

  /* ─── Divider ────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 24px 18px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #C9973A44;
  }
  .divider__star { color: var(--ritual-gold); font-size: 10px; }

  /* ─── Dietary ────────────────── */
  .dietary {
    margin: 0 24px 20px;
    padding: 12px 16px;
    background: #0d0d0d;
    border-left: 2px solid #C9973A44;
    border-radius: 2px;
  }
  .dietary__label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ritual-gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .dietary__pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .dietary__pill {
    font-size: 11px;
    background: #1a1a1a;
    border: 1px solid #C9973A44;
    color: var(--moonlight);
    padding: 3px 10px;
    border-radius: 2px;
  }
  .dietary__notes {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
    font-style: italic;
    line-height: 1.5;
  }

  /* ─── Botón quemar ───────────── */
  .burn-zone { padding: 0 24px 28px; }

  .burn-label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ritual-gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .burn-input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #C9973A44;
    border-radius: 2px;
    color: var(--pale-gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 12px 16px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: .05em;
  }
  .burn-input:focus { border-color: var(--ritual-gold); }
  .burn-input::placeholder { color: #444; }
  .burn-input.error { border-color: #cf6f6f; }

  .btn-burn {
    width: 100%;
    background: var(--ritual-gold);
    color: var(--obsidian);
    border: none;
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity .2s;
  }
  .btn-burn:hover { opacity: .85; }
  .btn-burn:disabled { opacity: .4; cursor: not-allowed; }

  .burned-msg {
    text-align: center;
    padding: 20px 0 0;
    font-size: 13px;
    color: var(--moonlight);
    font-weight: 300;
    line-height: 1.7;
  }
  .burned-msg strong { color: #cf6f6f; display: block; font-size: 15px; margin-bottom: 6px; }

  /* ─── Loading / Error ────────── */
  .state-screen {
    text-align: center;
    padding: 48px 24px;
  }
  .state-screen__icon { font-size: 28px; color: var(--ritual-gold); margin-bottom: 16px; }
  .state-screen__title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--pale-gold);
    margin-bottom: 8px;
  }
  .state-screen__body { font-size: 13px; color: var(--moonlight); font-weight: 300; line-height: 1.7; }

  /* ─── Footer ─────────────────── */
  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 10px;
    color: #333;
    letter-spacing: .05em;
  }
</style>
</head>
<body>

<div class="header">
  <p class="header__label">Validación de boleto</p>
  <h1 class="header__logo">TUL - DÁ</h1>
  <p class="header__route">MÉRIDA → TULUM</p>
</div>

<div class="card" id="card">
  <div class="status-bar loading" id="statusBar">Cargando…</div>
  <div id="content">
    <div class="state-screen">
      <div class="state-screen__icon">✦</div>
      <p class="state-screen__title">Verificando boleto</p>
      <p class="state-screen__body">Un momento, por favor.</p>
    </div>
  </div>
</div>

<div class="footer">Tul-Dá by Guru Davar · Bubble Mesh</div>

<script>
(function () {
  var API = 'https://tul-da-agent-production.up.railway.app';
  var params = new URLSearchParams(location.search);
  var id = params.get('id');

  var statusBar = document.getElementById('statusBar');
  var content   = document.getElementById('content');

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }

  function renderValid(r) {
    statusBar.className = 'status-bar valid';
    statusBar.textContent = '✓ Boleto válido';

    var dietHtml = '';
    if (r.dietary && r.dietary.length) {
      var pills = r.dietary.map(function(d){ return '<span class="dietary__pill">' + esc(d) + '</span>'; }).join('');
      dietHtml = '<div class="dietary">' +
        '<div class="dietary__label">Restricciones alimenticias</div>' +
        '<div class="dietary__pills">' + pills + '</div>' +
        (r.dietaryNotes ? '<p class="dietary__notes">' + esc(r.dietaryNotes) + '</p>' : '') +
        '</div>';
    }

    content.innerHTML =
      '<div class="info">' +
        '<div class="info__row">' +
          '<div class="info__label">Nombre</div>' +
          '<div class="info__value">' + esc(r.name) + '</div>' +
        '</div>' +
        '<div class="info__row">' +
          '<div class="info__label">Paquete</div>' +
          '<div class="info__value">' + esc(r.pkg || '—') + '</div>' +
        '</div>' +
        '<div class="info__row">' +
          '<div class="info__label">Boletos</div>' +
          '<div class="info__value-sm">' + esc(r.tickets) + ' persona' + (r.tickets > 1 ? 's' : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="divider"><span class="divider__star">✦</span></div>' +
      dietHtml +
      '<div class="burn-zone">' +
        '<div class="burn-label">Clave de operación</div>' +
        '<input class="burn-input" id="burnSecret" type="password" placeholder="••••••" autocomplete="off">' +
        '<button class="btn-burn" id="btnBurn">Quemar boleto</button>' +
      '</div>';

    document.getElementById('btnBurn').addEventListener('click', function () {
      burn(id);
    });
  }

  function renderBurned(burnedAt) {
    statusBar.className = 'status-bar burned';
    statusBar.textContent = '✕ Boleto utilizado';

    var when = burnedAt ? new Date(burnedAt).toLocaleString('es-MX', {dateStyle:'long', timeStyle:'short'}) : '';
    content.innerHTML =
      '<div class="burn-zone" style="padding-top:24px;">' +
        '<div class="burned-msg"><strong>Este boleto ya fue utilizado.</strong>' +
        (when ? 'Quemado el ' + esc(when) + '.' : '') + '</div>' +
      '</div>';
  }

  function renderError(msg) {
    statusBar.className = 'status-bar error';
    statusBar.textContent = 'Error';
    content.innerHTML =
      '<div class="state-screen">' +
        '<div class="state-screen__icon">◇</div>' +
        '<p class="state-screen__title">No encontrado</p>' +
        '<p class="state-screen__body">' + esc(msg || 'No se pudo verificar este boleto.') + '</p>' +
      '</div>';
  }

  function burn(reservationId) {
    var btn = document.getElementById('btnBurn');
    var input = document.getElementById('burnSecret');
    var secret = input ? input.value : '';

    if (!secret.trim()) {
      if (input) { input.classList.add('error'); input.focus(); }
      return;
    }
    if (input) input.classList.remove('error');
    if (btn) { btn.disabled = true; btn.textContent = 'Procesando…'; }

    fetch(API + '/api/entrada/' + encodeURIComponent(reservationId) + '/burn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: secret }),
    })
      .then(function (r) { return r.json().then(function(d){ return {ok: r.ok, data: d}; }); })
      .then(function (res) {
        if (res.ok) {
          renderBurned(res.data.burnedAt);
        } else if (res.data && res.data.error && res.data.error.includes('ya fue utilizado')) {
          renderBurned(null);
        } else {
          if (btn) { btn.disabled = false; btn.textContent = 'Quemar boleto'; }
          var errMsg = res.data && res.data.error ? res.data.error : 'Error al quemar el boleto.';
          if (errMsg.includes('Clave')) {
            if (input) { input.classList.add('error'); input.value = ''; input.focus(); }
          }
          alert(errMsg);
        }
      })
      .catch(function () {
        if (btn) { btn.disabled = false; btn.textContent = 'Quemar boleto'; }
        alert('Error de red. Intenta de nuevo.');
      });
  }

  if (!id) {
    renderError('No se proporcionó un ID de boleto.');
    return;
  }

  fetch(API + '/api/entrada/' + encodeURIComponent(id))
    .then(function (r) { return r.json().then(function(d){ return {ok: r.ok, data: d}; }); })
    .then(function (res) {
      if (!res.ok) { renderError(res.data && res.data.error); return; }
      var r = res.data;
      if (r.burned) {
        renderBurned(r.burnedAt);
      } else {
        renderValid(r);
      }
    })
    .catch(function () { renderError('Error de conexión. Verifica tu internet.'); });
})();
</script>
</body>
</html>
