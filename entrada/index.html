<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Tul-Dá — Validar boleto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --obsidian:    #0A0A0A;
    --deep-night:  #111111;
    --ritual-gold: #C9973A;
    --pale-gold:   #E8D5A3;
    --moonlight:   #D4CFC8;
  }

  html { height: 100%; }

  body {
    min-height: 100%;
    background: var(--obsidian);
    color: var(--pale-gold);
    font-family: 'Montserrat', Arial, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    padding:
      env(safe-area-inset-top, 0)
      env(safe-area-inset-right, 0)
      env(safe-area-inset-bottom, 0)
      env(safe-area-inset-left, 0);
  }

  /* ─── Layout ─────────────────── */
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
    min-height: 100vh;
  }

  /* ─── Header ─────────────────── */
  .header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    margin-bottom: 28px;
  }
  .header__eyebrow {
    font-size: 9px;
    letter-spacing: .25em;
    color: var(--moonlight);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header__logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(28px, 8vw, 38px);
    font-weight: 600;
    color: var(--ritual-gold);
    letter-spacing: .06em;
    line-height: 1;
  }
  .header__route {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--moonlight);
    margin-top: 5px;
  }

  /* ─── Card ───────────────────── */
  .card {
    background: var(--deep-night);
    border: 1px solid #C9973A33;
    border-radius: 4px;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }

  /* ─── Status bar ─────────────── */
  .status-bar {
    padding: 13px 20px;
    text-align: center;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .status-bar.valid   { background: #0f2a0f; color: #6fcf6f; border-bottom: 1px solid #6fcf6f33; }
  .status-bar.burned  { background: #2a0f0f; color: #cf6f6f; border-bottom: 1px solid #cf6f6f33; }
  .status-bar.loading { background: #1a1a1a; color: var(--moonlight); border-bottom: 1px solid #222; }
  .status-bar.error   { background: #2a1f0f; color: #cfaa6f; border-bottom: 1px solid #cfaa6f33; }

  /* ─── Info section ───────────── */
  .info { padding: 24px 24px 4px; }

  .info-row {
    margin-bottom: 20px;
  }
  .info-label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ritual-gold);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .info-value {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(20px, 5vw, 24px);
    color: var(--pale-gold);
    line-height: 1.2;
  }
  .info-value-sm {
    font-size: 14px;
    color: var(--moonlight);
    font-weight: 300;
    line-height: 1.5;
  }

  /* ─── Divider ────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 24px 20px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #C9973A33;
  }
  .divider__star { color: var(--ritual-gold); font-size: 10px; flex-shrink: 0; }

  /* ─── Dietary ────────────────── */
  .dietary {
    margin: 0 24px 20px;
    padding: 14px 16px;
    background: #0d0d0d;
    border-left: 2px solid #C9973A44;
  }
  .dietary-label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ritual-gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .dietary-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .dietary-pill {
    font-size: 11px;
    background: #1a1a1a;
    border: 1px solid #C9973A33;
    color: var(--moonlight);
    padding: 4px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .dietary-notes {
    margin-top: 10px;
    font-size: 12px;
    color: #666;
    font-style: italic;
    line-height: 1.6;
  }

  /* ─── Burn zone ──────────────── */
  .burn-zone { padding: 0 24px 28px; }

  .burn-label {
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ritual-gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .burn-input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #C9973A33;
    border-radius: 2px;
    color: var(--pale-gold);
    font-family: 'Montserrat', Arial, sans-serif;
    font-size: 15px;
    font-weight: 300;
    padding: 14px 16px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .burn-input:focus { border-color: var(--ritual-gold); }
  .burn-input::placeholder { color: #3a3a3a; }
  .burn-input.shake { animation: shake .3s ease; border-color: #cf6f6f !important; }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    75%{transform:translateX(6px)}
  }

  .btn-burn {
    width: 100%;
    background: var(--ritual-gold);
    color: var(--obsidian);
    border: none;
    padding: 16px;
    min-height: 52px;
    font-family: 'Montserrat', Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-burn:active { opacity: .8; }
  .btn-burn:disabled { opacity: .35; cursor: not-allowed; }

  /* ─── Estado quemado ─────────── */
  .burned-block {
    padding: 24px 24px 28px;
    text-align: center;
  }
  .burned-block__icon { font-size: 28px; color: #cf6f6f; margin-bottom: 12px; }
  .burned-block__title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px;
    color: #cf6f6f;
    margin-bottom: 8px;
  }
  .burned-block__sub { font-size: 13px; color: #666; font-weight: 300; line-height: 1.7; }

  /* ─── Estado loading/error ───── */
  .state-screen {
    text-align: center;
    padding: 48px 24px;
  }
  .state-screen__icon { font-size: 26px; color: var(--ritual-gold); margin-bottom: 16px; }
  .state-screen__title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    color: var(--pale-gold);
    margin-bottom: 8px;
  }
  .state-screen__body { font-size: 13px; color: var(--moonlight); font-weight: 300; line-height: 1.7; }

  /* ─── Footer ─────────────────── */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: .05em;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <p class="header__eyebrow">Validación de boleto</p>
    <h1 class="header__logo">TUL - DÁ</h1>
    <p class="header__route">MÉRIDA → TULUM</p>
  </header>

  <div class="card" id="card">
    <div class="status-bar loading" id="statusBar">Cargando…</div>
    <div id="content">
      <div class="state-screen">
        <div class="state-screen__icon">✦</div>
        <p class="state-screen__title">Verificando boleto</p>
        <p class="state-screen__body">Un momento, por favor.</p>
      </div>
    </div>
  </div>

  <p class="footer">Tul-Dá by Guru Davar · Bubble Mesh</p>

</div>

<script>
(function () {
  'use strict';

  var API    = 'https://tul-da-agent-production.up.railway.app';
  var id     = new URLSearchParams(location.search).get('id');
  var $bar   = document.getElementById('statusBar');
  var $body  = document.getElementById('content');

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
  }

  /* ── Renders ──────────────────────────────────────────── */

  function renderLoading() {
    $bar.className = 'status-bar loading';
    $bar.textContent = 'Verificando…';
  }

  function renderValid(r) {
    $bar.className  = 'status-bar valid';
    $bar.textContent = '✓  Boleto válido';

    var dietHtml = '';
    if (r.dietary && r.dietary.length) {
      var pills = r.dietary.map(function (d) {
        return '<span class="dietary-pill">' + esc(d) + '</span>';
      }).join('');
      dietHtml =
        '<div class="divider"><span class="divider__star">✦</span></div>' +
        '<div class="dietary">' +
          '<p class="dietary-label">Restricciones alimenticias</p>' +
          '<div class="dietary-pills">' + pills + '</div>' +
          (r.dietaryNotes ? '<p class="dietary-notes">' + esc(r.dietaryNotes) + '</p>' : '') +
        '</div>';
    }

    $body.innerHTML =
      '<div class="info">' +
        '<div class="info-row">' +
          '<p class="info-label">Nombre</p>' +
          '<p class="info-value">' + esc(r.name) + '</p>' +
        '</div>' +
        '<div class="info-row">' +
          '<p class="info-label">Paquete</p>' +
          '<p class="info-value">' + esc(r.pkg || '—') + '</p>' +
        '</div>' +
        '<div class="info-row">' +
          '<p class="info-label">Boletos</p>' +
          '<p class="info-value-sm">' + esc(r.tickets) + ' persona' + (r.tickets > 1 ? 's' : '') + '</p>' +
        '</div>' +
      '</div>' +
      dietHtml +
      '<div class="divider"><span class="divider__star">✦</span></div>' +
      '<div class="burn-zone">' +
        '<p class="burn-label">Clave de operación</p>' +
        '<input class="burn-input" id="burnSecret" type="password" placeholder="••••••" autocomplete="off" inputmode="text">' +
        '<button class="btn-burn" id="btnBurn">Quemar boleto</button>' +
      '</div>';

    document.getElementById('btnBurn').addEventListener('click', function () {
      burn(id);
    });
    document.getElementById('burnSecret').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') burn(id);
    });
  }

  function renderBurned(burnedAt) {
    $bar.className  = 'status-bar burned';
    $bar.textContent = '✕  Boleto utilizado';

    var when = '';
    if (burnedAt) {
      try {
        when = new Date(burnedAt).toLocaleString('es-MX', { dateStyle: 'long', timeStyle: 'short' });
      } catch (e) { when = burnedAt; }
    }

    $body.innerHTML =
      '<div class="burned-block">' +
        '<div class="burned-block__icon">◇</div>' +
        '<p class="burned-block__title">Este boleto ya fue utilizado.</p>' +
        (when ? '<p class="burned-block__sub">Quemado el ' + esc(when) + '.</p>' : '') +
      '</div>';
  }

  function renderError(msg) {
    $bar.className  = 'status-bar error';
    $bar.textContent = 'No encontrado';
    $body.innerHTML =
      '<div class="state-screen">' +
        '<div class="state-screen__icon">◇</div>' +
        '<p class="state-screen__title">Boleto no encontrado</p>' +
        '<p class="state-screen__body">' + esc(msg || 'No se pudo verificar este boleto.') + '</p>' +
      '</div>';
  }

  /* ── Quemar ───────────────────────────────────────────── */

  function burn(reservationId) {
    var $btn    = document.getElementById('btnBurn');
    var $input  = document.getElementById('burnSecret');
    var secret  = $input ? $input.value.trim() : '';

    if (!secret) {
      if ($input) {
        $input.classList.remove('shake');
        void $input.offsetWidth; // reflow para reiniciar animación
        $input.classList.add('shake');
        $input.focus();
      }
      return;
    }
    if ($input) $input.classList.remove('shake');
    if ($btn)   { $btn.disabled = true; $btn.textContent = 'Procesando…'; }

    fetch(API + '/api/entrada/' + encodeURIComponent(reservationId) + '/burn', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ secret: secret }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (res.ok) {
          renderBurned(res.data.burnedAt);
        } else if (res.data && res.data.error && res.data.error.includes('ya fue utilizado')) {
          renderBurned(null);
        } else {
          if ($btn)   { $btn.disabled = false; $btn.textContent = 'Quemar boleto'; }
          if ($input && res.data && res.data.error && res.data.error.includes('Clave')) {
            $input.value = '';
            $input.classList.remove('shake');
            void $input.offsetWidth;
            $input.classList.add('shake');
            $input.focus();
          } else {
            alert(res.data && res.data.error ? res.data.error : 'Error al quemar el boleto.');
          }
        }
      })
      .catch(function () {
        if ($btn) { $btn.disabled = false; $btn.textContent = 'Quemar boleto'; }
        alert('Error de red. Verifica tu conexión e intenta de nuevo.');
      });
  }

  /* ── Carga inicial ────────────────────────────────────── */

  if (!id) { renderError('No se proporcionó un ID de boleto.'); return; }

  fetch(API + '/api/entrada/' + encodeURIComponent(id))
    .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
    .then(function (res) {
      if (!res.ok) { renderError(res.data && res.data.error); return; }
      if (res.data.burned) renderBurned(res.data.burnedAt);
      else renderValid(res.data);
    })
    .catch(function () { renderError('Error de conexión. Verifica tu internet.'); });

})();
</script>
</body>
</html>
